name: Deploy Production

# CI pushes images to GHCR; this workflow verifies them and then triggers
# Watchtower over Tailscale to pull immediately instead of waiting for the
# hourly fallback poll.  GitHub Deployments tracks every production deploy.

on:
  workflow_run:
    workflows: ["CD / Main Merge"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # workflow_run events carry the triggering SHA in a different field
      - name: Resolve deploy SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.deployments.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ steps.sha.outputs.sha }}',
              environment: 'production',
              description: 'Deploy via Watchtower HTTP API',
              auto_merge: false,
              required_contexts: [],
            });
            await github.rest.deployments.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: data.id,
              state: 'in_progress',
              description: 'Verifying GHCR images',
            });
            return data.id;
          result-encoding: string

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify images in GHCR
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          FAILED=0
          for APP in bunkbot covabot djcova bluebot; do
            IMAGE="ghcr.io/${OWNER_LC}/${APP}:main"
            if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "  ✓ ${IMAGE}"
            else
              echo "  ✗ ${IMAGE} not found or inaccessible"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-client-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Trigger Watchtower update
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.WATCHTOWER_TOKEN }}" \
            "http://${{ secrets.WATCHTOWER_HOST }}:8080/v1/update"
          echo "Watchtower update triggered on ${{ secrets.WATCHTOWER_HOST }}"

      - name: Mark deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.deployments.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'success',
              description: 'Watchtower triggered — containers updating',
            });

      - name: Mark deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.deployments.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'failure',
              description: 'Deploy failed — check workflow logs',
            });
