name: CD / Main Merge

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write

jobs:
  build_apps:
    name: Build Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Notify — build started
        if: vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            🔨 **Build started** (`${{ env.SHORT_SHA }}`)
            > ${{ github.event.head_commit.message }}
            Triggered by **${{ github.actor }}** — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Clean and build
        run: |
          npm run clean || true
          npm run build
      - name: Compress artifacts
        run: |
          tar -czf build-artifacts.tar.gz \
            src/*/dist/ \
            src/*/package.json \
            package.json \
            package-lock.json
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: build-artifacts.tar.gz
          retention-days: 1

  docker_publish:
    name: Docker Publish
    runs-on: ubuntu-latest
    needs: build_apps
    strategy:
      fail-fast: false
      matrix:
        app: [bunkbot, covabot, djcova, bluebot]
    steps:
      - uses: actions/checkout@v6
      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts
      - name: Extract artifacts
        run: tar -xzf build-artifacts.tar.gz

      - name: Compute content hash
        id: compute_hash
        run: |
          APP=${{ matrix.app }}
          HASH=$(git rev-parse HEAD:src/${APP} 2>/dev/null || echo "no-hash")
          SHARED_HASH=$(git rev-parse HEAD:src/shared 2>/dev/null || echo "no-shared")
          DEPS_HASH=$(sha256sum package-lock.json | cut -d' ' -f1 | head -c 12)
          CONTENT_HASH="${HASH:0:12}-${SHARED_HASH:0:12}-${DEPS_HASH}"
          echo "HASH=${CONTENT_HASH}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check exists and build image
        id: check_build
        run: |
          APP=${{ matrix.app }}
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/${APP}"
          GIT_SHA="${GITHUB_SHA:0:7}"

          if docker manifest inspect "${IMAGE}:sha-${HASH}" > /dev/null 2>&1; then
            echo "Image exists. Pulling instead of building."
            docker pull "${IMAGE}:sha-${HASH}"
            docker tag "${IMAGE}:sha-${HASH}" "${IMAGE}:main"
          else
            echo "Building image ${IMAGE}:main"
            docker build -f ./src/${APP}/Dockerfile.ci -t ${IMAGE}:main -t ${IMAGE}:sha-${HASH} .
            docker push ${IMAGE}:sha-${HASH}
          fi
          docker tag "${IMAGE}:main" "${IMAGE}:sha-${GIT_SHA}"
          docker push "${IMAGE}:main"
          docker push "${IMAGE}:sha-${GIT_SHA}"

  notify_images_published:
    name: Notify Images Published
    runs-on: ubuntu-latest
    needs: docker_publish
    if: always() && vars.DISCORD_NOTIFY_USER_ID != ''
    steps:
      - uses: actions/checkout@v6

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Notify — images published
        if: needs.docker_publish.result == 'success'
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            🐳 **Docker images published** (`${{ env.SHORT_SHA }}`)
            All 4 images (bunkbot, covabot, djcova, bluebot) pushed to GHCR as `:main` and `:sha-${{ env.SHORT_SHA }}`
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify — images failed
        if: needs.docker_publish.result == 'failure'
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            ❌ **Docker publish FAILED** (`${{ env.SHORT_SHA }}`)
            One or more images failed to build or push.
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  e2e_tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: docker_publish
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Process E2E bot config
        run: |
          mkdir -p e2e-bots-processed
          E2E_CI_SENDER_BOT_ID="${{ secrets.E2E_DISCORD_SENDER_BOT_ID }}" \
            envsubst < src/e2e/config/e2e-test-bots.template.yml \
            > e2e-bots-processed/bots.yml
          echo "Generated e2e-bots-processed/bots.yml:"
          cat e2e-bots-processed/bots.yml

      - name: Start E2E bot containers
        run: docker compose -f docker-compose.e2e.yml up -d
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: main
          E2E_BUNKBOT_TOKEN: ${{ secrets.E2E_BUNKBOT_TOKEN }}
          E2E_BLUEBOT_TOKEN: ${{ secrets.E2E_BLUEBOT_TOKEN }}
          E2E_DJCOVA_TOKEN: ${{ secrets.E2E_DJCOVA_TOKEN }}
          E2E_COVABOT_TOKEN: ${{ secrets.E2E_COVABOT_TOKEN }}
          E2E_DISCORD_SENDER_BOT_ID: ${{ secrets.E2E_DISCORD_SENDER_BOT_ID }}
          E2E_DISCORD_ENEMY_BOT_ID: ${{ secrets.E2E_DISCORD_ENEMY_BOT_ID }}
          E2E_GEMINI_API_KEY: ${{ secrets.E2E_GEMINI_API_KEY }}
          BLUEBOT_REPLY_WINDOW_MS: "6000"

      - name: Run E2E tests
        run: cd src/e2e && npm test
        env:
          E2E_DISCORD_SENDER_TOKEN: ${{ secrets.E2E_DISCORD_SENDER_TOKEN }}
          E2E_DISCORD_SENDER_BOT_ID: ${{ secrets.E2E_DISCORD_SENDER_BOT_ID }}
          E2E_DISCORD_ENEMY_TOKEN: ${{ secrets.E2E_DISCORD_ENEMY_TOKEN }}
          E2E_DISCORD_ENEMY_BOT_ID: ${{ secrets.E2E_DISCORD_ENEMY_BOT_ID }}
          E2E_DISCORD_TEST_GUILD_ID: ${{ secrets.E2E_DISCORD_TEST_GUILD_ID }}
          E2E_CHANNEL_INFRASTRUCTURE: ${{ secrets.E2E_CHANNEL_INFRASTRUCTURE }}
          E2E_CHANNEL_BUNKBOT: ${{ secrets.E2E_CHANNEL_BUNKBOT }}
          E2E_CHANNEL_BLUEBOT: ${{ secrets.E2E_CHANNEL_BLUEBOT }}
          E2E_CHANNEL_COVABOT: ${{ secrets.E2E_CHANNEL_COVABOT }}
          E2E_CHANNEL_DJCOVA: ${{ secrets.E2E_CHANNEL_DJCOVA }}
          E2E_VOICE_CHANNEL_DJCOVA: ${{ secrets.E2E_VOICE_CHANNEL_DJCOVA }}
          E2E_BUNKBOT_BOT_ID: ${{ secrets.E2E_BUNKBOT_BOT_ID }}
          E2E_BLUEBOT_BOT_ID: ${{ secrets.E2E_BLUEBOT_BOT_ID }}
          E2E_COVABOT_BOT_ID: ${{ secrets.E2E_COVABOT_BOT_ID }}
          E2E_DJCOVA_BOT_ID: ${{ secrets.E2E_DJCOVA_BOT_ID }}
          E2E_DJCOVA_TEST_AUDIO_URL: ${{ secrets.E2E_DJCOVA_TEST_AUDIO_URL }}
          BLUEBOT_REPLY_WINDOW_MS: "6000"

      - name: Collect container logs on failure
        if: failure()
        run: |
          echo "=== BunkBot ===" && docker compose -f docker-compose.e2e.yml logs bunkbot
          echo "=== BlueBot ===" && docker compose -f docker-compose.e2e.yml logs bluebot
          echo "=== DJCova ===" && docker compose -f docker-compose.e2e.yml logs djcova
          echo "=== CovaBot ===" && docker compose -f docker-compose.e2e.yml logs covabot

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results/e2e.junit.xml
          if-no-files-found: ignore

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

      - name: Notify — E2E passed
        if: success() && vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            ✅ **E2E tests passed**
            All end-to-end tests passed against the `:main` images.
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify — E2E failed
        if: failure() && vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            ❌ **E2E tests FAILED** — deploy is blocked
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  publish_releases:
    name: Publish Releases
    runs-on: ubuntu-latest
    needs: [docker_publish, e2e_tests]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push latest
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for APP in bunkbot covabot djcova bluebot; do
            IMAGE="ghcr.io/${OWNER_LC}/${APP}"
            docker pull ${IMAGE}:main
            docker tag ${IMAGE}:main ${IMAGE}:latest
            docker push ${IMAGE}:latest
          done

      - name: Run semantic-release
        id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN }}
        run: |
          OLD_VERSION=$(cat config/VERSION 2>/dev/null || echo "0.0.0")
          npx semantic-release
          NEW_VERSION=$(cat config/VERSION 2>/dev/null || echo "0.0.0")
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Released version $NEW_VERSION"
          else
            echo "No new release generated"
          fi

      - name: Tag images with VERSION
        if: steps.semrel.outputs.new_version != ''
        run: |
          VERSION=${{ steps.semrel.outputs.new_version }}
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for APP in bunkbot covabot djcova bluebot; do
            IMAGE="ghcr.io/${OWNER_LC}/${APP}"
            docker pull ${IMAGE}:latest || true
            docker tag ${IMAGE}:latest ${IMAGE}:${VERSION}
            docker push ${IMAGE}:${VERSION}
          done

      - name: Create build tag (no semantic release)
        id: build_tag
        if: steps.semrel.outputs.new_version == ''
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BUILD_TAG="build-$(date +%Y%m%d)-${GITHUB_SHA:0:7}"
          git tag "$BUILD_TAG" -m "CI build ${GITHUB_RUN_NUMBER} from ${GITHUB_SHA:0:7}"
          git push origin "$BUILD_TAG"
          echo "tag=$BUILD_TAG" >> $GITHUB_OUTPUT
          echo "No semantic release — created build tag: ${BUILD_TAG}"

      - name: Notify — new version released
        if: steps.semrel.outputs.new_version != '' && vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            🚀 **v${{ steps.semrel.outputs.new_version }} released**
            Images tagged and pushed. Watchtower will deploy within 5 minutes.
            — [View release](${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.semrel.outputs.new_version }})

      - name: Notify — build tagged
        if: steps.semrel.outputs.new_version == '' && vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            🏷️ **Build tagged** (`${{ steps.build_tag.outputs.tag }}`)
            No version bump. Watchtower will deploy `:latest` within 5 minutes.
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
