name: CD / Main Merge

on:
  push:
    branches: [ main ]

jobs:
  build_apps:
    name: Build Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Clean and build
        run: |
          npm run clean || true
          npm run build
      - name: Compress artifacts
        run: |
          tar -czf build-artifacts.tar.gz \
            src/*/dist/ \
            src/*/package.json \
            package.json \
            package-lock.json
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build-artifacts.tar.gz
          retention-days: 1

  docker_publish:
    name: Docker Publish
    runs-on: ubuntu-latest
    needs: build_apps
    strategy:
      fail-fast: false
      matrix:
        app: [bunkbot, covabot, djcova, bluebot]
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
      - name: Extract artifacts
        run: tar -xzf build-artifacts.tar.gz
      
      - name: Compute content hash
        id: compute_hash
        run: |
          APP=${{ matrix.app }}
          HASH=$(git rev-parse HEAD:src/${APP} 2>/dev/null || echo "no-hash")
          SHARED_HASH=$(git rev-parse HEAD:src/shared 2>/dev/null || echo "no-shared")
          DEPS_HASH=$(sha256sum package-lock.json | cut -d' ' -f1 | head -c 12)
          CONTENT_HASH="${HASH:0:12}-${SHARED_HASH:0:12}-${DEPS_HASH}"
          echo "HASH=${CONTENT_HASH}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check exists and build image
        id: check_build
        run: |
          APP=${{ matrix.app }}
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/${APP}"
          
          if docker manifest inspect "${IMAGE}:sha-${HASH}" > /dev/null 2>&1; then
            echo "Image exists. Pulling instead of building."
            docker pull "${IMAGE}:sha-${HASH}"
            docker tag "${IMAGE}:sha-${HASH}" "${IMAGE}:main"
          else
            echo "Building image ${IMAGE}:main"
            docker build -f ./src/${APP}/Dockerfile.ci -t ${IMAGE}:main -t ${IMAGE}:sha-${HASH} .
            docker push ${IMAGE}:sha-${HASH}
          fi
          docker push ${IMAGE}:main

  publish_releases:
    name: Publish Releases
    runs-on: ubuntu-latest
    needs: docker_publish
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}
          
      - name: Tag and push latest
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for APP in bunkbot covabot djcova bluebot; do
            IMAGE="ghcr.io/${OWNER_LC}/${APP}"
            docker pull ${IMAGE}:main
            docker tag ${IMAGE}:main ${IMAGE}:latest
            docker push ${IMAGE}:latest
          done

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN }}
        run: npx semantic-release
        
      - name: Tag images with VERSION
        run: |
          if [ ! -f config/VERSION ]; then
            echo "No new version generated, skipping version tagging."
            exit 0
          fi
          VERSION=$(cat config/VERSION | tr -d '\n')
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for APP in bunkbot covabot djcova bluebot; do
            IMAGE="ghcr.io/${OWNER_LC}/${APP}"
            docker pull ${IMAGE}:latest || true
            docker tag ${IMAGE}:latest ${IMAGE}:${VERSION}
            docker push ${IMAGE}:${VERSION}
          done
