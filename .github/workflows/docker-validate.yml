name: Docker Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  docker_validation:
    name: Docker Build & Validate
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'validate')
    strategy:
      fail-fast: false
      matrix:
        app: [bunkbot, covabot, djcova, bluebot]
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Apps
        run: npm run build
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Docker build
        run: |
          APP=${{ matrix.app }}
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/${APP}"
          docker build -f ./src/${APP}/Dockerfile.ci -t ${IMAGE}:test .
          
      - name: Run container and health check
        run: |
          APP=${{ matrix.app }}
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/${APP}:test"
          docker run -d --name ${APP}-test \
            -e DISCORD_TOKEN=test \
            -e DEBUG_MODE=true \
            -e CI_SMOKE_MODE=true \
            -e CI=true \
            -e NODE_ENV=test \
            -e METRICS_PORT=3000 \
            $IMAGE
          
          sleep 10
          if [ "$(docker inspect -f '{{.State.Running}}' ${APP}-test)" != "true" ]; then
            echo "Container ${APP}-test crashed!"
            docker logs ${APP}-test
            exit 1
          fi
