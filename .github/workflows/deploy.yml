name: Deploy to Production

# Push-based deployment via Tailscale SSH (no SSH key management).
# On every successful CD run, the runner joins the tailnet using OAuth,
# then SSHs into Tower via Tailscale SSH to run deploy.sh + health-check.sh.
#
# Required secrets (production environment):
#   TS_OAUTH_CLIENT_ID  — Tailscale OAuth client ID (tag:ci)
#   TS_OAUTH_SECRET     — Tailscale OAuth client secret
#   SSH_HOST            — Tower's Tailscale hostname or 100.x.x.x IP
#   SSH_USER            — SSH user on Tower (typically root)
#
# Required Tailscale setup:
#   1. Create an OAuth client at tailscale.com/admin/settings/oauth
#      with the "auth_keys" scope and tag:ci assigned.
#   2. Enable Tailscale SSH on Tower: `tailscale up --ssh`
#   3. Add an ACL rule allowing tag:ci to SSH to Tower, e.g.:
#        { "action": "accept", "src": ["tag:ci"], "dst": ["tag:prod"], "proto": "tcp", "ports": ["22"] }
#      and tag Tower with tag:prod in the Tailscale admin panel.

on:
  workflow_run:
    workflows: ["CD / Main Merge"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Preflight — check required secrets
        env:
          CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
        run: |
          MISSING=""
          [[ -z "$CLIENT_ID" ]]     && MISSING="$MISSING TS_OAUTH_CLIENT_ID"
          [[ -z "$CLIENT_SECRET" ]] && MISSING="$MISSING TS_OAUTH_SECRET"
          [[ -z "$HOST" ]]          && MISSING="$MISSING SSH_HOST"
          [[ -z "$USER" ]]          && MISSING="$MISSING SSH_USER"
          if [[ -n "$MISSING" ]]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify connectivity to Tower
        run: tailscale ping --c 3 "${{ secrets.SSH_HOST }}"

      - name: Notify — deploy started
        if: vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            🚀 **Production deploy started** (`${{ env.SHORT_SHA }}`)
            — [View deployment](${{ github.server_url }}/${{ github.repository }}/deployments/activity_log?environment=production)

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "bash -s -- /mnt/user/appdata/starbunk main ${SHORT_SHA}" \
            < scripts/deployment/deploy.sh

      - name: Health check
        run: |
          ssh -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'bash -s -- /mnt/user/appdata/starbunk' \
            < scripts/deployment/health-check.sh

      - name: Notify — deploy succeeded
        if: success() && vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            ✅ **Production deploy succeeded** (`${{ env.SHORT_SHA }}`)
            All containers running and healthy.
            — [View deployment](${{ github.server_url }}/${{ github.repository }}/deployments/activity_log?environment=production)

      - name: Notify — deploy failed
        if: failure() && vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            ❌ **Production deploy FAILED** (`${{ env.SHORT_SHA }}`)
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
