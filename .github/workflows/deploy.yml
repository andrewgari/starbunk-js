name: Deploy Production Tag

on:
  workflow_run:
    workflows: ["CD / Main Merge"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy_to_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    concurrency: production
    environment: production
    # Only deploy when triggered by a successful CD workflow, or manually
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      COMPOSE_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE || '/mnt/user/appdata/starbunk-js/.env' }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Login to GHCR on server
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "echo \"$GHCR_TOKEN\" | docker login ghcr.io --username \"$REPO_OWNER\" --password-stdin"

      - name: Pull latest images
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "docker compose --env-file \"$COMPOSE_ENV_FILE\" pull"

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "docker compose --env-file \"$COMPOSE_ENV_FILE\" up -d --remove-orphans"
