name: Deploy Production Tag

on:
  workflow_run:
    workflows: ["CD / Main Merge"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy_to_production:
    name: Deploy Production
    runs-on: self-hosted
    concurrency: production
    environment: production
    # Only deploy when triggered by a successful CD workflow, or manually
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        run: |
          docker compose pull

      - name: Deploy
        run: |
          docker compose --env-file ${{ vars.DEPLOY_ENV_FILE }} up -d --remove-orphans

      - name: Notify Discord Deployment
        uses: rjstone/discord-webhook-notify@v1
        if: always()
        with:
          severity: ${{ job.status == 'success' && 'info' || 'error' }}
          details: Production deployment finished with status ${{ job.status }}
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK_URL }}
