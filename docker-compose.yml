version: "3.8"

# Production deployment using pre-built images from GitHub Container Registry (GHCR)
# Images are built by CI/CD pipeline and tagged as 'main' for the latest production build
# For local development with source builds, see src/{service}/docker-compose.dev.yml

services:
  # BunkBot - Next generation YAML-based reply bot system
  bunkbot:
    image: ghcr.io/andrewgari/bunkbot:main
    container_name: starbunk-bunkbot
    restart: unless-stopped
    environment:
      # Core Discord Configuration
      - DISCORD_TOKEN=${BUNKBOT_TOKEN:-${STARBUNK_TOKEN}}

      # Storage Configuration
      # BUNKBOT_BOTS_DIR=/app/config  # Optional: defaults to /app/config

      # Observability Configuration
      - SERVICE_NAME=${BUNKBOT_SERVICE_NAME:-bunkbot}
      - OTEL_SERVICE_NAME=${BUNKBOT_SERVICE_NAME:-bunkbot}
      - METRICS_PORT=${METRICS_PORT:-3000}
      - ENABLE_METRICS=${ENABLE_METRICS:-true}
      - ENABLE_STRUCTURED_LOGGING=${ENABLE_STRUCTURED_LOGGING:-true}
      # OTEL Collector Configuration
      - OTEL_COLLECTOR_HOST=${OTEL_COLLECTOR_HOST:-starbunk-otel-collector}
      - OTEL_COLLECTOR_HTTP_PORT=${OTEL_COLLECTOR_HTTP_PORT:-4318}

      # Environment & Logging
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - BUNKBOT_WEB_PORT=${BUNKBOT_WEB_PORT:-7081}
      # CI smoke mode (skips Discord login; serves /health only)
      - CI_SMOKE_MODE=${CI_SMOKE_MODE:-false}

      # Debug/Testing Configuration
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - TESTING_SERVER_IDS=${TESTING_SERVER_IDS:-}
      - TESTING_CHANNEL_IDS=${TESTING_CHANNEL_IDS:-}
    volumes:
      - ${HOST_WORKDIR}/config/bunkbot:/app/config:ro
    ports:
      - "${BUNKBOT_WEB_PORT:-7081}:7081"
    networks:
      - starbunk-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.starbunk.service=bunkbot
      - prometheus.io/scrape=true
      - prometheus.io/path=/metrics
      - prometheus.io/port=3000
      - com.centurylinklabs.watchtower.enable=true
      - io.portainer.icon=https://github.com/andrewgari/starbunk-js/blob/main/assets/bunkbot.png
      - net.unraid.docker.icon=https://github.com/andrewgari/starbunk-js/blob/main/assets/bunkbot.png
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # DJCova - Music service
  djcova:
    image: ghcr.io/andrewgari/djcova:main
    container_name: starbunk-djcova
    restart: unless-stopped
    environment:
      # Node/Runtime Configuration
      - NODE_ENV=production

      # Core Discord Configuration
      - DISCORD_TOKEN=${DJCOVA_TOKEN:-${STARBUNK_TOKEN}}

      # Observability Configuration
      - SERVICE_NAME=${DJCOVA_SERVICE_NAME:-djcova}
      - OTEL_SERVICE_NAME=${DJCOVA_SERVICE_NAME:-djcova}
      - METRICS_PORT=${METRICS_PORT:-3000}
      - ENABLE_METRICS=${ENABLE_METRICS:-true}
      - ENABLE_STRUCTURED_LOGGING=${ENABLE_STRUCTURED_LOGGING:-true}
      # OTEL Collector Configuration
      - OTEL_COLLECTOR_HOST=${OTEL_COLLECTOR_HOST:-starbunk-otel-collector}
      - OTEL_COLLECTOR_HTTP_PORT=${OTEL_COLLECTOR_HTTP_PORT:-4318}

      # Environment & Logging
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # CI smoke mode (skips Discord login; serves /health only)
      - CI_SMOKE_MODE=${CI_SMOKE_MODE:-false}

      # Debug/Testing Configuration
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - TESTING_SERVER_IDS=${TESTING_SERVER_IDS:-}
      - TESTING_CHANNEL_IDS=${TESTING_CHANNEL_IDS:-}
    volumes:
      - ${HOST_WORKDIR}/config/djcova:/app/config:ro
      - ${HOST_WORKDIR}/data/djcova:/data
    networks:
      - starbunk-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.starbunk.service=djcova
      - prometheus.io/scrape=true
      - prometheus.io/path=/metrics
      - prometheus.io/port=3000
      - com.centurylinklabs.watchtower.enable=true
      - io.portainer.icon=https://github.com/andrewgari/starbunk-js/blob/main/assets/djcova.png
      - net.unraid.docker.icon=https://github.com/andrewgari/starbunk-js/blob/main/assets/djcova.png
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # CovaBot - AI personality bot (Cognitive Simulacrum)
  covabot:
    image: ghcr.io/andrewgari/covabot:main
    container_name: starbunk-covabot
    restart: unless-stopped
    environment:
      # Node/Runtime Configuration
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=768

      # Core Discord Configuration
      - DISCORD_TOKEN=${COVABOT_TOKEN:-${STARBUNK_TOKEN}}

      # AI/LLM Configuration
      # Set at least one of the following provider keys:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_DEFAULT_MODEL=${OLLAMA_DEFAULT_MODEL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_DEFAULT_MODEL=${ANTHROPIC_DEFAULT_MODEL:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_DEFAULT_MODEL=${GEMINI_DEFAULT_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_DEFAULT_MODEL=${OPENAI_DEFAULT_MODEL:-}
      - OLLAMA_AUTO_PULL_MODELS=${OLLAMA_AUTO_PULL_MODELS:-true}
      - OLLAMA_PULL_ON_STARTUP=${OLLAMA_PULL_ON_STARTUP:-true}
      - OLLAMA_PULL_TIMEOUT_MS=${OLLAMA_PULL_TIMEOUT_MS:-1200000}

      # Database Services - PostgreSQL (Conversation Memory)
      - POSTGRES_HOST=${POSTGRES_HOST:-starbunk-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-starbunk}
      - POSTGRES_USER=${POSTGRES_USER:-starbunk}
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Error: POSTGRES_PASSWORD environment variable is required for security}"

      # Storage Configuration
      - COVABOT_DATA_DIR=/app/data
      - COVABOT_API_KEY=${COVABOT_API_KEY:-}
      - COVABOT_PERSONALITIES_PATH=${COVABOT_PERSONALITIES_PATH:-}
      - COVABOT_DATABASE_PATH=${COVABOT_DATABASE_PATH:-}

      # Cache & Vector DB
      - REDIS_URL=${REDIS_URL:-redis://starbunk-redis:6379}
      - QDRANT_URL=${QDRANT_URL:-http://starbunk-qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}

      # Observability Configuration
      - SERVICE_NAME=${COVABOT_SERVICE_NAME:-covabot}
      - OTEL_SERVICE_NAME=${COVABOT_SERVICE_NAME:-covabot}
      - METRICS_PORT=3000
      - ENABLE_METRICS=${ENABLE_METRICS:-true}
      - ENABLE_STRUCTURED_LOGGING=${ENABLE_STRUCTURED_LOGGING:-true}
      # OTEL Collector Configuration
      - OTEL_COLLECTOR_HOST=${OTEL_COLLECTOR_HOST:-starbunk-otel-collector}
      - OTEL_COLLECTOR_HTTP_PORT=${OTEL_COLLECTOR_HTTP_PORT:-4318}

      # Environment & Logging
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # CI smoke mode (skips Discord login; serves /health only)
      - CI_SMOKE_MODE=${CI_SMOKE_MODE:-false}

      # Debug/Testing Configuration
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - COVA_USER_ID=${COVA_USER_ID:-}
      - TESTING_SERVER_IDS=${TESTING_SERVER_IDS:-}
      - TESTING_CHANNEL_IDS=${TESTING_CHANNEL_IDS:-}

      # Verbose decision logging (set to true to see why the bot speaks/stays silent at INFO level)
      - COVABOT_VERBOSE=${COVABOT_VERBOSE:-false}
      # Prompt-level logging (set to true to log raw LLM responses — very noisy)
      - COVABOT_LOG_PROMPTS=${COVABOT_LOG_PROMPTS:-false}
    volumes:
      - ${HOST_WORKDIR}/config/covabot:/app/config:ro
      - ${HOST_WORKDIR}/data/covabot:/app/data
    depends_on:
      - starbunk-postgres
      - starbunk-redis
      - starbunk-qdrant
    ports:
      - "${COVABOT_WEB_PORT:-7080}:7080"
    networks:
      - starbunk-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.starbunk.service=covabot
      - prometheus.io/scrape=true
      - prometheus.io/path=/metrics
      - prometheus.io/port=3000
      - com.centurylinklabs.watchtower.enable=true
      - io.portainer.icon=https://github.com/andrewgari/starbunk-js/blob/main/assets/covabot.png
      - net.unraid.docker.icon=https://github.com/andrewgari/starbunk-js/blob/main/assets/covabot.png
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # BlueBot - Blue detection and response bot
  bluebot:
    image: ghcr.io/andrewgari/bluebot:main
    container_name: starbunk-bluebot
    restart: unless-stopped
    environment:
      # Node/Runtime Configuration
      - NODE_ENV=production

      # Core Discord Configuration
      - DISCORD_TOKEN=${BLUEBOT_TOKEN:-${STARBUNK_TOKEN}}

      # Observability Configuration
      - SERVICE_NAME=${BLUEBOT_SERVICE_NAME:-bluebot}
      - OTEL_SERVICE_NAME=${BLUEBOT_SERVICE_NAME:-bluebot}
      - METRICS_PORT=3000
      - ENABLE_METRICS=${ENABLE_METRICS:-true}
      - ENABLE_STRUCTURED_LOGGING=${ENABLE_STRUCTURED_LOGGING:-true}
      # OTEL Collector Configuration
      - OTEL_COLLECTOR_HOST=${OTEL_COLLECTOR_HOST:-starbunk-otel-collector}
      - OTEL_COLLECTOR_HTTP_PORT=${OTEL_COLLECTOR_HTTP_PORT:-4318}

      # Environment & Logging
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # CI smoke mode (skips Discord login; serves /health only)
      - CI_SMOKE_MODE=${CI_SMOKE_MODE:-false}

      # Debug/Testing Configuration
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - TESTING_SERVER_IDS=${TESTING_SERVER_IDS:-}
      - TESTING_CHANNEL_IDS=${TESTING_CHANNEL_IDS:-}
    volumes:
      - ${HOST_WORKDIR}/config/bluebot:/app/config:ro
      - ${HOST_WORKDIR}/data/bluebot:/app/data
    networks:
      - starbunk-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.starbunk.service=bluebot
      - prometheus.io/scrape=true
      - prometheus.io/path=/metrics
      - prometheus.io/port=3000
      - com.centurylinklabs.watchtower.enable=true
      - io.portainer.icon=https://github.com/andrewgari/starbunk-js/blob/main/assets/bluebot.png
      - net.unraid.docker.icon=https://github.com/andrewgari/starbunk-js/blob/main/assets/bluebot.png
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # OpenTelemetry Collector - Unified telemetry pipeline
  starbunk-otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    container_name: starbunk-exporter
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ${HOST_WORKDIR}/infrastructure/monitoring/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    expose:
      - "14317"
      - "14318"
      - "8888"
      - "8889"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - OBSERVABILITY_HOST=${OBSERVABILITY_HOST:-localhost}
      - PROMETHEUS_PORT=${PROMETHEUS_PORT:-9090}
      - LOKI_PORT=${LOKI_PORT:-3100}
      - TEMPO_PORT=${TEMPO_PORT:-4317}
    networks:
      - starbunk-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.starbunk.service=otel-collector
      - prometheus.io/scrape=true
      - prometheus.io/path=/metrics
      - prometheus.io/port=${OTEL_METRICS_PORT:-8889}
      - io.portainer.icon=https://opentelemetry.io/img/logos/opentelemetry-logo-nav.png
      - net.unraid.docker.icon=https://opentelemetry.io/img/logos/opentelemetry-logo-nav.png
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # PostgreSQL - Relational database (internal only)
  starbunk-postgres:
    image: pgvector/pgvector:pg16
    container_name: starbunk-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-starbunk}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_DB=${POSTGRES_DB:-starbunk}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ${HOST_WORKDIR}/data/postgres:/var/lib/postgresql/data
    networks:
      starbunk-network:
        aliases:
          - starbunk-db  # backward-compat alias for deployments that still reference the old container name
    # No ports exposed - internal access only
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.starbunk.service=postgres
      - io.portainer.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/postgres.svg
      - net.unraid.docker.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/postgres.svg
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-starbunk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Session cache and state management (internal only)
  starbunk-redis:
    image: redis:7-alpine
    container_name: starbunk-redis
    restart: unless-stopped
    command: sh -c "redis-server $${REDIS_PASSWORD:+--requirepass \"$$REDIS_PASSWORD\"} --maxmemory 256mb --maxmemory-policy allkeys-lru"
    volumes:
      - ${HOST_WORKDIR}/data/redis:/data
    networks:
      - starbunk-network
    # No ports exposed - internal access only
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.starbunk.service=redis
      - io.portainer.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/redis.svg
      - net.unraid.docker.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/redis.svg
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a \"$REDIS_PASSWORD\"} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - Vector database for semantic search (internal only)
  starbunk-qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: starbunk-qdrant
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    volumes:
      - ${HOST_WORKDIR}/data/qdrant:/qdrant/storage
    networks:
      - starbunk-network
    # No ports exposed - internal access only
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.starbunk.service=qdrant
      - io.portainer.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/qdrant.svg
      - net.unraid.docker.icon=https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/qdrant.svg
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      # v1.7.4 has no curl/wget — use bash TCP check
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # Watchtower - Automatic container update service (push-triggered CD)
  # Triggered by CI via HTTP API over Tailscale after images land in GHCR.
  # Falls back to hourly polling if the HTTP trigger is missed.
  # Required .env vars on the host: GHCR_USER, GHCR_TOKEN, WATCHTOWER_TOKEN
  watchtower:
    image: containrrr/watchtower:latest
    container_name: starbunk-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Only update containers that explicitly opt in via label
      - WATCHTOWER_LABEL_ENABLE=true
      # Hourly fallback poll — CI triggers updates immediately via HTTP API
      - WATCHTOWER_POLL_INTERVAL=3600
      # Remove old images after update to reclaim disk space
      - WATCHTOWER_CLEANUP=true
      # Include containers that are currently restarting
      - WATCHTOWER_INCLUDE_RESTARTING=true
      # HTTP API — CI POSTs /v1/update over Tailscale to trigger immediate pull
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN}
      # GHCR credentials — store in the host .env file, never commit
      - REPO_USER=${GHCR_USER}
      - REPO_PASS=${GHCR_TOKEN}
    ports:
      # Bound to all interfaces so Tailscale traffic reaches it.
      # Protected by WATCHTOWER_HTTP_API_TOKEN — do not expose to the internet.
      - "8080:8080"
    networks:
      - starbunk-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - com.starbunk.service=watchtower
      # Watchtower should not update itself
      - com.centurylinklabs.watchtower.enable=false

networks:
  starbunk-network:
    driver: bridge
    name: starbunk-network  # Force explicit name so multi-stack Portainer deployments share the same bridge
