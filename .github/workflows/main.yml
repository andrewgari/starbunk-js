name: CD / Main Merge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:

  # ─── Detect which apps changed ───────────────────────────────────────────────
  detect_changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    # Skip the entire pipeline when the version-bump commit itself triggers the
    # workflow (GitHub's built-in [skip ci] support is not guaranteed for all
    # event types, so we add an explicit guard here as well).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    outputs:
      apps: ${{ steps.matrix.outputs.apps }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            bunkbot:
              - 'src/bunkbot/**'
            djcova:
              - 'src/djcova/**'
            covabot:
              - 'src/covabot/**'
            bluebot:
              - 'src/bluebot/**'
            shared:
              - 'src/shared/**'

      - name: Build app matrix
        id: matrix
        run: |
          # On manual dispatch, always build everything
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo 'apps=["bunkbot","djcova","covabot","bluebot"]' >> $GITHUB_OUTPUT
            exit 0
          fi

          SHARED="${{ steps.filter.outputs.shared }}"
          APPS=()
          [[ "${{ steps.filter.outputs.bunkbot }}" == "true" || "$SHARED" == "true" ]] && APPS+=("bunkbot")
          [[ "${{ steps.filter.outputs.djcova }}"  == "true" || "$SHARED" == "true" ]] && APPS+=("djcova")
          [[ "${{ steps.filter.outputs.covabot }}" == "true" || "$SHARED" == "true" ]] && APPS+=("covabot")
          [[ "${{ steps.filter.outputs.bluebot }}" == "true" || "$SHARED" == "true" ]] && APPS+=("bluebot")

          if [ ${#APPS[@]} -eq 0 ]; then
            # No app-level changes (e.g. only CI/root files changed) — build all
            echo 'apps=["bunkbot","djcova","covabot","bluebot"]' >> $GITHUB_OUTPUT
          else
            APPS_JSON=$(printf '%s\n' "${APPS[@]}" | jq -R . | jq -sc .)
            echo "apps=$APPS_JSON" >> $GITHUB_OUTPUT
          fi

  # ─── Build ───────────────────────────────────────────────────────────────────
  build_apps:
    name: Build Apps
    runs-on: ubuntu-latest
    needs: detect_changes
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags needed by bump-versions.sh to analyse commits
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Notify — build started
        if: vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            🔨 **Build started** (`${{ env.SHORT_SHA }}`)
            > ${{ github.event.head_commit.message }}
            Apps: `${{ needs.detect_changes.outputs.apps }}`
            Triggered by **${{ github.actor }}** — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine version bumps
        # Runs BEFORE the build so APP_VERSION baked into Docker images reflects
        # the new version. Writes per-app VERSION files + .version-bumps.json.
        # Does NOT commit — that happens in publish_releases after E2E passes.
        run: bash scripts/bump-versions.sh

      - name: Build changed apps (shared always rebuilt as a dependency)
        run: |
          npm run clean || true
          npm run build:shared
          for APP in $(echo '${{ needs.detect_changes.outputs.apps }}' | jq -r '.[]'); do
            echo "--- Building ${APP} ---"
            npm run "build:${APP}"
          done

      - name: Compress artifacts
        run: |
          DIRS="src/shared/dist/"
          for APP in $(echo '${{ needs.detect_changes.outputs.apps }}' | jq -r '.[]'); do
            DIRS="$DIRS src/${APP}/dist/"
          done
          tar -czf build-artifacts.tar.gz \
            $DIRS \
            src/*/package.json \
            src/*/VERSION \
            .version-bumps.json \
            package.json \
            VERSION \
            package-lock.json

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: build-artifacts.tar.gz
          retention-days: 1

  # ─── Docker publish (only changed apps) ──────────────────────────────────────
  docker_publish:
    name: Docker Publish
    runs-on: ubuntu-latest
    needs: [detect_changes, build_apps]
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect_changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts

      - name: Extract artifacts
        run: tar -xzf build-artifacts.tar.gz

      - name: Compute content hash
        id: compute_hash
        run: |
          APP=${{ matrix.app }}
          HASH=$(git rev-parse HEAD:src/${APP} 2>/dev/null || echo "no-hash")
          SHARED_HASH=$(git rev-parse HEAD:src/shared 2>/dev/null || echo "no-shared")
          DEPS_HASH=$(sha256sum package-lock.json | cut -d' ' -f1 | head -c 12)
          CONTENT_HASH="${HASH:0:12}-${SHARED_HASH:0:12}-${DEPS_HASH}"
          echo "HASH=${CONTENT_HASH}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check exists and build image
        id: check_build
        run: |
          APP=${{ matrix.app }}
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/${APP}"
          GIT_SHA="${GITHUB_SHA:0:7}"

          if docker manifest inspect "${IMAGE}:sha-${HASH}" > /dev/null 2>&1; then
            echo "Image exists. Pulling instead of building."
            docker pull "${IMAGE}:sha-${HASH}"
            docker tag "${IMAGE}:sha-${HASH}" "${IMAGE}:main"
          else
            echo "Building image ${IMAGE}:main"
            APP_VERSION=$(cat "src/${APP}/VERSION" 2>/dev/null || echo "dev")
            docker build -f ./src/${APP}/Dockerfile.ci \
              --build-arg APP_VERSION="${APP_VERSION}" \
              -t ${IMAGE}:main -t ${IMAGE}:sha-${HASH} .
            docker push ${IMAGE}:sha-${HASH}
          fi
          docker tag "${IMAGE}:main" "${IMAGE}:sha-${GIT_SHA}"
          docker push "${IMAGE}:main"
          docker push "${IMAGE}:sha-${GIT_SHA}"

  notify_images_published:
    name: Notify Images Published
    runs-on: ubuntu-latest
    needs: [detect_changes, docker_publish]
    if: always() && vars.DISCORD_NOTIFY_USER_ID != ''
    steps:
      - uses: actions/checkout@v6

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Notify — images published
        if: needs.docker_publish.result == 'success'
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            🐳 **Docker images published** (`${{ env.SHORT_SHA }}`)
            Apps published: `${{ needs.detect_changes.outputs.apps }}`
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify — images failed
        if: needs.docker_publish.result == 'failure'
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            ❌ **Docker publish FAILED** (`${{ env.SHORT_SHA }}`)
            One or more images failed to build or push.
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # ─── E2E (always full suite — catches cross-app regressions) ─────────────────
  e2e_tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: docker_publish
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Process E2E bot config
        run: |
          mkdir -p e2e-bots-processed
          E2E_CI_SENDER_BOT_ID="${{ secrets.E2E_DISCORD_SENDER_BOT_ID }}" \
            envsubst < src/e2e/config/e2e-test-bots.template.yml \
            > e2e-bots-processed/bots.yml
          echo "Generated e2e-bots-processed/bots.yml:"
          cat e2e-bots-processed/bots.yml

      - name: Start E2E bot containers
        run: docker compose -f docker-compose.e2e.yml up -d
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: main
          E2E_BUNKBOT_TOKEN: ${{ secrets.E2E_BUNKBOT_TOKEN }}
          E2E_BLUEBOT_TOKEN: ${{ secrets.E2E_BLUEBOT_TOKEN }}
          E2E_DJCOVA_TOKEN: ${{ secrets.E2E_DJCOVA_TOKEN }}
          E2E_COVABOT_TOKEN: ${{ secrets.E2E_COVABOT_TOKEN }}
          E2E_DISCORD_SENDER_BOT_ID: ${{ secrets.E2E_DISCORD_SENDER_BOT_ID }}
          E2E_DISCORD_ENEMY_BOT_ID: ${{ secrets.E2E_DISCORD_ENEMY_BOT_ID }}
          E2E_GEMINI_API_KEY: ${{ secrets.E2E_GEMINI_API_KEY }}
          BLUEBOT_REPLY_WINDOW_MS: "6000"

      - name: Run E2E tests
        run: cd src/e2e && npm test
        env:
          E2E_DISCORD_SENDER_TOKEN: ${{ secrets.E2E_DISCORD_SENDER_TOKEN }}
          E2E_DISCORD_SENDER_BOT_ID: ${{ secrets.E2E_DISCORD_SENDER_BOT_ID }}
          E2E_DISCORD_ENEMY_TOKEN: ${{ secrets.E2E_DISCORD_ENEMY_TOKEN }}
          E2E_DISCORD_ENEMY_BOT_ID: ${{ secrets.E2E_DISCORD_ENEMY_BOT_ID }}
          E2E_DISCORD_TEST_GUILD_ID: ${{ secrets.E2E_DISCORD_TEST_GUILD_ID }}
          E2E_CHANNEL_INFRASTRUCTURE: ${{ secrets.E2E_CHANNEL_INFRASTRUCTURE }}
          E2E_CHANNEL_BUNKBOT: ${{ secrets.E2E_CHANNEL_BUNKBOT }}
          E2E_CHANNEL_BLUEBOT: ${{ secrets.E2E_CHANNEL_BLUEBOT }}
          E2E_CHANNEL_COVABOT: ${{ secrets.E2E_CHANNEL_COVABOT }}
          E2E_CHANNEL_DJCOVA: ${{ secrets.E2E_CHANNEL_DJCOVA }}
          E2E_VOICE_CHANNEL_DJCOVA: ${{ secrets.E2E_VOICE_CHANNEL_DJCOVA }}
          E2E_BUNKBOT_BOT_ID: ${{ secrets.E2E_BUNKBOT_BOT_ID }}
          E2E_BLUEBOT_BOT_ID: ${{ secrets.E2E_BLUEBOT_BOT_ID }}
          E2E_COVABOT_BOT_ID: ${{ secrets.E2E_COVABOT_BOT_ID }}
          E2E_DJCOVA_BOT_ID: ${{ secrets.E2E_DJCOVA_BOT_ID }}
          E2E_DJCOVA_TEST_AUDIO_URL: ${{ secrets.E2E_DJCOVA_TEST_AUDIO_URL }}
          BLUEBOT_REPLY_WINDOW_MS: "6000"

      - name: Collect container logs on failure
        if: failure()
        run: |
          echo "=== BunkBot ===" && docker compose -f docker-compose.e2e.yml logs bunkbot
          echo "=== BlueBot ===" && docker compose -f docker-compose.e2e.yml logs bluebot
          echo "=== DJCova ===" && docker compose -f docker-compose.e2e.yml logs djcova
          echo "=== CovaBot ===" && docker compose -f docker-compose.e2e.yml logs covabot

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results/e2e.junit.xml
          if-no-files-found: ignore

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

      - name: Notify — E2E passed
        if: success() && vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            ✅ **E2E tests passed**
            All end-to-end tests passed against the `:main` images.
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify — E2E failed
        if: failure() && vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            ❌ **E2E tests FAILED** — deploy is blocked
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # ─── Commit versions + tag releases ─────────────────────────────────────────
  publish_releases:
    name: Publish Releases
    runs-on: ubuntu-latest
    needs: [detect_changes, docker_publish, e2e_tests]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts

      - name: Restore pre-bumped VERSION files from artifact
        # The build artifact contains the already-bumped per-app VERSION files,
        # package.json files, and .version-bumps.json written by bump-versions.sh
        # in build_apps. Extract them so we can commit them here rather than
        # re-running the bump script (which would recalculate from git history).
        run: |
          tar -xzf build-artifacts.tar.gz \
            --wildcards \
            'src/*/VERSION' 'src/*/package.json' \
            'package.json' 'VERSION' \
            2>/dev/null || tar -xzf build-artifacts.tar.gz

      - name: Read bumped versions
        id: bump
        run: |
          VERSIONS_JSON=$(cat .version-bumps.json 2>/dev/null || echo '{}')
          echo "versions=$VERSIONS_JSON" >> $GITHUB_OUTPUT

      - name: Tag changed apps as :latest
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for APP in $(echo '${{ needs.detect_changes.outputs.apps }}' | jq -r '.[]'); do
            IMAGE="ghcr.io/${OWNER_LC}/${APP}"
            docker pull ${IMAGE}:main
            docker tag ${IMAGE}:main ${IMAGE}:latest
            docker push ${IMAGE}:latest
          done

      - name: Commit version bumps
        id: commit
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add src/*/VERSION src/*/package.json package.json VERSION
          if git diff --staged --quiet; then
            echo "No version changes to commit"
            echo "bumped=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(release): bump per-app versions [skip ci]"
            git push
            echo "bumped=true" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN }}

      - name: Create per-app tags and version Docker images
        if: steps.commit.outputs.bumped == 'true'
        run: |
          VERSIONS='${{ steps.bump.outputs.versions }}'
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          for APP in bunkbot djcova covabot bluebot shared; do
            VERSION=$(echo "$VERSIONS" | jq -r --arg app "$APP" '.[$app] // empty')
            [[ -z "$VERSION" ]] && continue

            TAG="${APP}-v${VERSION}"

            # Idempotent: skip if tag already exists (handles workflow re-runs)
            if git tag -l "$TAG" | grep -q .; then
              echo "Tag $TAG already exists — skipping"
            else
              git tag "$TAG" -m "Release ${APP} v${VERSION}"
              echo "Created tag: ${TAG}"
            fi

            # Tag the Docker image (bots only, shared has no image)
            if [[ "$APP" != "shared" ]]; then
              IMAGE="ghcr.io/${OWNER_LC}/${APP}"
              docker pull "${IMAGE}:latest" || true
              docker tag "${IMAGE}:latest" "${IMAGE}:${VERSION}"
              docker push "${IMAGE}:${VERSION}"
            fi
          done

          git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN }}

      - name: Create build tag (no version bumps)
        id: build_tag
        if: steps.commit.outputs.bumped == 'false'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BUILD_TAG="build-$(date +%Y%m%d)-${GITHUB_SHA:0:7}"
          git tag "$BUILD_TAG" -m "CI build ${GITHUB_RUN_NUMBER} from ${GITHUB_SHA:0:7}"
          git push origin "$BUILD_TAG"
          echo "tag=$BUILD_TAG" >> $GITHUB_OUTPUT
          echo "No version bumps — created build tag: ${BUILD_TAG}"
        env:
          GITHUB_TOKEN: ${{ secrets.CI_TOKEN }}

      - name: Notify — versions released
        if: steps.commit.outputs.bumped == 'true' && vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            🚀 **Versions released**
            `${{ steps.bump.outputs.versions }}`
            Docker images tagged and pushed. Deployment will follow.
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify — build tagged
        if: steps.commit.outputs.bumped == 'false' && vars.DISCORD_NOTIFY_USER_ID != ''
        uses: ./.github/actions/discord-dm
        with:
          bot_token: ${{ secrets.DISCORD_NOTIFY_TOKEN }}
          user_id: ${{ vars.DISCORD_NOTIFY_USER_ID }}
          message: |
            🏷️ **Build tagged** (`${{ steps.build_tag.outputs.tag }}`)
            No version bump. Deployment will use `:latest`.
            — [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
