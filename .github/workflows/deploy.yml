name: Deploy Production Tag

on:
  workflow_run:
    workflows: ["CD / Main Merge"]
    types: [completed]
    branches: [main]

jobs:
  deploy_to_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    concurrency: production
    environment: production
    # Only deploy when the CD workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      # Skip gracefully when deploy secrets are not configured (e.g. forks, dev repos)
      - name: Preflight — check deploy secrets
        id: preflight
        env:
          WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [[ -n "$WEBHOOK_URL" ]]; then
            echo "run_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Deploy Skipped::PORTAINER_WEBHOOK_URL not configured in the 'production' environment — skipping deployment."
            echo "run_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Portainer Stack Update
        if: steps.preflight.outputs.run_deploy == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          echo "Portainer webhook response: $STATUS"
          if ! echo "$STATUS" | grep -qE '^(200|204)$'; then
            echo "::error::Portainer webhook returned unexpected status: $STATUS"
            exit 1
          fi

      - name: Notify Discord Deployment
        uses: rjstone/discord-webhook-notify@v1
        if: always() && steps.preflight.outputs.run_deploy == 'true'
        with:
          severity: ${{ job.status == 'success' && 'info' || 'error' }}
          details: Production deployment finished with status ${{ job.status }}
          webhookUrl: ${{ vars.DISCORD_WEBHOOK_URL }}
